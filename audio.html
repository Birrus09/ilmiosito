<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Riproduzione Audio</title>
</head>
<body>

  <style>
            button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
  </style>

<button onclick="riproduciAudio()">Riproduci audio</button>

<audio id="mioAudio">
  <source src="pipupipa.mp3" type="audio/mpeg">
  Il tuo browser non supporta l'audio.
</audio>

<script>
  function riproduciAudio() {
    const audio = document.getElementById("mioAudio");
    audio.play();
  }
</script>

</body>
</html>
